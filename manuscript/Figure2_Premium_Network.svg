<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" style="background:#ffffff; font-family:Arial, Helvetica, sans-serif;">
  <defs>
    <!-- Gradients for sleek overlapping semi-transparent circles -->
    <radialGradient id="gradRed" cx="30%" cy="30%" r="70%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#ff7675" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c0392b" stop-opacity="0.9"/>
    </radialGradient>
    <radialGradient id="gradBlue" cx="70%" cy="30%" r="70%" fx="70%" fy="30%">
      <stop offset="0%" stop-color="#74b9ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2980b9" stop-opacity="0.9"/>
    </radialGradient>
    
    <!-- Shadow for network nodes -->
    <filter id="nodeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <text x="600" y="40" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Figure 2. Target Convergence and Topological Architecture</text>
  
  <text x="50" y="80" font-size="20" font-weight="bold" fill="#34495e">A. Functional Intersection</text>
  <text x="600" y="80" font-size="20" font-weight="bold" fill="#34495e">B. Core Hub Hierarchy (Top 10 + Sensors)</text>

  <!-- PANEL A: Sleek Venn Diagram -->
  <g transform="translate(100, 150)">
    <!-- Red Circle -->
    <circle cx="150" cy="180" r="140" fill="url(#gradRed)" style="mix-blend-mode: multiply;"/>
    <!-- Blue Circle -->
    <circle cx="280" cy="180" r="140" fill="url(#gradBlue)" style="mix-blend-mode: multiply;"/>
    
    <!-- Labels inside Venn -->
    <text x="90" y="170" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Atropine</text>
    <text x="90" y="190" font-size="14" fill="#ffffff" text-anchor="middle">Targets</text>
    <text x="90" y="210" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">(N=128)</text>

    <text x="340" y="170" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Myopia</text>
    <text x="340" y="190" font-size="14" fill="#ffffff" text-anchor="middle">Genes</text>
    <text x="340" y="210" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">(N=195)</text>

    <!-- Intersection text -->
    <text x="215" y="170" font-size="20" font-weight="900" fill="#ffffff" text-anchor="middle">Intersection</text>
    <text x="215" y="200" font-size="28" font-weight="900" fill="#f1c40f" text-anchor="middle">N=47</text>
    
    <!-- External legends -->
    <text x="150" y="340" font-size="12" fill="#7f8c8d" text-anchor="middle">CTD / DrugBank / Simons</text>
    <text x="280" y="340" font-size="12" fill="#7f8c8d" text-anchor="middle">CTD / DisGeNET Direct</text>
  </g>

  <!-- PANEL B: Hierarchical Core Hub Network -->
  <!-- Drawing background connections (edges) first so they go behind nodes -->
  <g transform="translate(680, 120)">
    
    <!-- Edges from Global Hubs to Receptors/Sensors -->
    <!-- Array of global hubs (x=0 to 300, y=50) -->
    <!-- Array of intermediaries (x=100 to 200, y=180) -->
    <!-- FOS (150, 180), EGFR (50, 180), DRD1, CHRM3, ADRA2A -->
    <!-- Central Convergence: TGFB1 (100, 310), YAP1 (150, 380), LATS1 (200, 310) -->

    <path d="M 0 50 L 50 180" stroke="#ecf0f1" stroke-width="2"/>
    <path d="M 60 50 L 50 180" stroke="#ecf0f1" stroke-width="2"/>
    <path d="M 120 50 L 150 180" stroke="#ecf0f1" stroke-width="2"/>
    <path d="M 180 50 L 150 180" stroke="#ecf0f1" stroke-width="2"/>
    <path d="M 240 50 L 250 180" stroke="#ecf0f1" stroke-width="2"/>
    <path d="M 300 50 L 350 180" stroke="#ecf0f1" stroke-width="2"/>
    <path d="M 360 50 L 350 180" stroke="#ecf0f1" stroke-width="2"/>
    <path d="M 420 50 L 350 180" stroke="#ecf0f1" stroke-width="2"/>
    <path d="M 480 50 L 450 180" stroke="#ecf0f1" stroke-width="2"/>

    <path d="M 50 180 L 100 310" stroke="#bdc3c7" stroke-width="3"/>
    <path d="M 150 180 L 100 310" stroke="#bdc3c7" stroke-width="3"/>
    <path d="M 150 180 L 200 310" stroke="#bdc3c7" stroke-width="3"/>
    <path d="M 250 180 L 200 310" stroke="#bdc3c7" stroke-width="3"/>
    <path d="M 350 180 L 300 310" stroke="#bdc3c7" stroke-width="3"/>
    <path d="M 450 180 L 400 310" stroke="#bdc3c7" stroke-width="3"/>
    
    <!-- Convergence to YAP1 (x=200, y=420) -->
    <path d="M 100 310 L 200 420" stroke="#e67e22" stroke-width="4"/>
    <path d="M 200 310 L 200 420" stroke="#e67e22" stroke-width="4"/>
    <path d="M 300 310 L 200 420" stroke="#e67e22" stroke-width="4"/>
    <path d="M 400 310 L 200 420" stroke="#e67e22" stroke-width="4"/>

    <!-- Nodes: Top Layer (Global Hubs) -->
    <!-- Circles defined in a loop-like structure -->
    <!-- Node 1 -->
    <circle cx="0" cy="50" r="22" fill="#34495e" filter="url(#nodeShadow)"/>
    <text x="0" y="55" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">TP53</text>
    <!-- Node 2 -->
    <circle cx="60" cy="50" r="22" fill="#34495e" filter="url(#nodeShadow)"/>
    <text x="60" y="55" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">AKT1</text>
    <!-- Node 3 -->
    <circle cx="120" cy="50" r="22" fill="#34495e" filter="url(#nodeShadow)"/>
    <text x="120" y="55" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">IL6</text>
    <!-- Node 4 -->
    <circle cx="180" cy="50" r="22" fill="#34495e" filter="url(#nodeShadow)"/>
    <text x="180" y="55" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">CTNNB1</text>
    <!-- Node 5 -->
    <circle cx="240" cy="50" r="22" fill="#34495e" filter="url(#nodeShadow)"/>
    <text x="240" y="55" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">TNF</text>
    <!-- Node 6 -->
    <circle cx="300" cy="50" r="22" fill="#34495e" filter="url(#nodeShadow)"/>
    <text x="300" y="55" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">JUN</text>
    <!-- Node 7 -->
    <circle cx="360" cy="50" r="22" fill="#34495e" filter="url(#nodeShadow)"/>
    <text x="360" y="55" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">IL1B</text>
    <!-- Node 8 -->
    <circle cx="420" cy="50" r="22" fill="#34495e" filter="url(#nodeShadow)"/>
    <text x="420" y="55" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">CASP3</text>
    <!-- Node 9 -->
    <circle cx="480" cy="50" r="22" fill="#34495e" filter="url(#nodeShadow)"/>
    <text x="480" y="55" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">MAPK3</text>

    <!-- Layer background Box labeling -->
    <path d="M -30 20 L 510 20 L 510 80 L -30 80 Z" fill="none" stroke="#bdc3c7" stroke-dasharray="5,5" stroke-width="1" rx="5"/>
    <text x="-35" y="55" font-size="12" font-weight="bold" fill="#7f8c8d" text-anchor="end">Global</text>
    <text x="-35" y="67" font-size="12" font-weight="bold" fill="#7f8c8d" text-anchor="end">Hubs</text>

    <!-- Nodes: Middle Layer (Signal Transducers & Receptors) -->
    <!-- DRD1, FOS, EGFR, ADRA2A, CHRM3 -->
    <circle cx="50" cy="180" r="25" fill="#9b59b6" filter="url(#nodeShadow)"/>
    <text x="50" y="185" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">EGFR</text>
    
    <circle cx="150" cy="180" r="25" fill="#9b59b6" filter="url(#nodeShadow)"/>
    <text x="150" y="185" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">FOS</text>
    
    <circle cx="250" cy="180" r="25" fill="#f1c40f" filter="url(#nodeShadow)"/>
    <text x="250" y="185" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">CHRM3</text>
    
    <circle cx="350" cy="180" r="25" fill="#f1c40f" filter="url(#nodeShadow)"/>
    <text x="350" y="185" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">DRD1</text>
    
    <circle cx="450" cy="180" r="25" fill="#f1c40f" filter="url(#nodeShadow)"/>
    <text x="450" y="185" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">ADRA2A</text>

    <path d="M 20 150 L 480 150 L 480 210 L 20 210 Z" fill="none" stroke="#bdc3c7" stroke-dasharray="5,5" stroke-width="1" rx="5"/>
    <text x="-35" y="185" font-size="12" font-weight="bold" fill="#7f8c8d" text-anchor="end">Signal / Receptor</text>

    <!-- Nodes: Convergence Core (TGFB1, LATS1/2, TEAD) -->
    <circle cx="100" cy="310" r="30" fill="#e74c3c" filter="url(#nodeShadow)"/>
    <text x="100" y="315" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">TGFB1</text>

    <circle cx="200" cy="310" r="30" fill="#e74c3c" filter="url(#nodeShadow)"/>
    <text x="200" y="310" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">MOB1/</text>
    <text x="200" y="325" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">LATS1(2)</text>

    <circle cx="300" cy="310" r="30" fill="#2980b9" filter="url(#nodeShadow)"/>
    <text x="300" y="315" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">TEAD</text>

    <circle cx="400" cy="310" r="30" fill="#2980b9" filter="url(#nodeShadow)"/>
    <text x="400" y="315" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">AMOT</text>

    <path d="M 60 270 L 440 270 L 440 350 L 60 350 Z" fill="none" stroke="#e74c3c" stroke-dasharray="5,5" stroke-width="2" rx="5"/>
    <text x="-35" y="315" font-size="12" font-weight="bold" fill="#7f8c8d" text-anchor="end">Extension Core</text>

    <!-- Final Convergence (YAP1) -->
    <circle cx="200" cy="420" r="40" fill="#2cc71e" stroke="#27ae60" stroke-width="3" filter="url(#nodeShadow)"/>
    <text x="200" y="427" font-size="20" font-weight="900" fill="#fff" text-anchor="middle">YAP1</text>

    <text x="-35" y="425" font-size="12" font-weight="bold" fill="#7f8c8d" text-anchor="end">Terminal Target</text>

  </g>
</svg>
